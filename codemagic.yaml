workflows:
  ios-release:
    name: iOS build & TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - app_store_credentials

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.fuyunon.nijimi

      vars:
        APP_STORE_APPLE_ID: 6779448292

      node: 22
      xcode: latest

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: npm 依存をインストール
        script: npm ci

      - name: Web アセットをビルド
        script: npm run build

      - name: Capacitor 同期
        script: npx cap sync ios

      - name: 署名設定
        script: xcode-project use-profiles

      # ビルド番号をタイムスタンプ(現在時刻の通し秒数)で設定。
      # 毎回必ず前回より大きい数になるので「番号の重複」エラーが起きない。
      - name: Build Number を設定(タイムスタンプで一意に)
        script: |
          cd ios/App

          BUILD_NUMBER=$(date +%s)

          echo "Setting Build Number = $BUILD_NUMBER"

          agvtool new-version -all "$BUILD_NUMBER"

          echo "---- VERIFY ----"
          agvtool what-version
          grep CURRENT_PROJECT_VERSION App.xcodeproj/project.pbxproj

      - name: ipa をビルド
        script: |
          cd ios/App
          xcode-project build-ipa --project App.xcodeproj --scheme App

    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: 5TANXUMG59
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
